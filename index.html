<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="健康评估">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0891B2">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
<title>身心健康评估</title>
<style>
:root{
  --cyan:#0891B2;--cyan-light:#E0F2FE;--cyan-dark:#0E7490;
  --orange:#F97316;--orange-light:#FFF7ED;
  --bg:#FAFAFA;--card:#FFFFFF;
  --text:#1E293B;--text-sub:#64748B;--border:#E2E8F0;
  --green:#22C55E; --yellow:#EAB308; --red:#EF4444;
  --radius:14px;--radius-sm:10px;
  --shadow:0 1px 4px rgba(0,0,0,0.06);--shadow-md:0 4px 12px rgba(0,0,0,0.08);
  --font:-apple-system,"HarmonyOS Sans","PingFang SC","Microsoft YaHei",sans-serif;
  --nav-h:52px;--tab-h:64px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,16px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;
  max-width:480px;margin:0 auto;min-height:100dvh;position:relative;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ===== NAV ===== */
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.85);
  border-bottom:1px solid var(--border);min-height:var(--nav-h);
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
  padding-top:constant(safe-area-inset-top,0);padding-top:var(--safe-top);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  height:auto;
}
.nav-title{font-size:17px;font-weight:700;letter-spacing:-0.3px}

/* ===== PAGES ===== */
.page{display:none;padding:12px 14px calc(var(--tab-h) + var(--safe-bottom) + 24px)}
.page.active{display:block;padding-top:calc(var(--nav-h) + var(--safe-top) + 10px)}

/* ===== TABS ===== */
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:rgba(255,255,255,.92);
  border-top:1px solid var(--border);display:flex;z-index:100;
  padding-bottom:constant(safe-area-inset-bottom,16px);padding-bottom:var(--safe-bottom);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  min-height:calc(var(--tab-h) + var(--safe-bottom));
}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:7px 0 5px;cursor:pointer;border:none;background:transparent;
  color:var(--text-sub);font-size:9px;font-weight:500;gap:1px;
  transition:color .25s;position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.tab.active{color:var(--cyan)}
.tab svg{width:20px;height:20px;transition:transform .2s}
.tab.active svg{transform:scale(1.08)}

/* ===== CARDS ===== */
.card{background:var(--card);border-radius:var(--radius);
  padding:18px;margin-bottom:10px;
  box-shadow:var(--shadow);border:1px solid var(--border);
  transition:box-shadow .25s,transform .25s;
}
.card-header{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text);
  display:flex;align-items:center;gap:8px;
}
.card-header .icon{font-size:16px}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:13px 22px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;
  cursor:pointer;border:none;transition:all .2s;
  -webkit-tap-highlight-color:transparent;text-decoration:none;white-space:nowrap;
}
.btn-primary{background:var(--cyan);color:#fff;
  box-shadow:0 2px 10px rgba(8,145,178,0.25);width:100%;
}
.btn-primary:active{transform:scale(.97);opacity:.92}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-outline{background:transparent;color:var(--cyan);border:1.5px solid var(--cyan)}
.btn-danger{background:var(--red);color:#fff}

/* ===== CTA BANNER ===== */
.cta-banner{
  background:linear-gradient(135deg,#0891B2 0%,#0E7490 100%);
  border-radius:var(--radius);padding:22px 20px;color:#fff;
  margin-bottom:12px;position:relative;overflow:hidden;
}
.cta-banner::before{
  content:'';position:absolute;top:-30px;right:-30px;
  width:100px;height:100px;border-radius:50%;
  background:rgba(255,255,255,0.1);
}
.cta-banner::after{
  content:'';position:absolute;bottom:-20px;left:-10px;
  width:60px;height:60px;border-radius:50%;
  background:rgba(255,255,255,0.07);
}
.cta-banner h3{font-size:16px;font-weight:700;margin-bottom:4px;position:relative;z-index:1}
.cta-banner p{font-size:13px;opacity:.85;margin-bottom:14px;position:relative;z-index:1}
.cta-btn{display:flex;align-items:center;justify-content:center;gap:6px;
  background:rgba(255,255,255,0.2);border:none;color:#fff;
  padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;
  cursor:pointer;backdrop-filter:blur(4px);position:relative;z-index:1;
  transition:background .2s;
}
.cta-btn:active{background:rgba(255,255,255,0.3)}

/* ===== FORM ===== */
.form-group{margin-bottom:16px}
.form-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.form-label .required{color:var(--red)}
.form-desc{font-size:11px;color:var(--text-sub);margin-top:4px;margin-bottom:10px}

.option-group{display:flex;flex-direction:column;gap:6px}
.option{padding:11px 14px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--card);
  font-size:13px;cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;user-select:none;
  display:flex;align-items:center;gap:10px;
}
.option .radio{
  width:18px;height:18px;border-radius:50%;border:2px solid var(--border);
  flex-shrink:0;transition:all .2s;position:relative;
}
.option.selected{border-color:var(--cyan);background:var(--cyan-light);color:var(--cyan-dark)}
.option.selected .radio{border-color:var(--cyan);background:var(--cyan)}
.option.selected .radio::after{
  content:'';position:absolute;top:3px;left:3px;
  width:8px;height:8px;border-radius:50%;background:#fff;
}

.check-group{display:flex;flex-wrap:wrap;gap:6px}
.check-tag{padding:7px 12px;border-radius:20px;
  border:1.5px solid var(--border);background:var(--card);
  font-size:12px;cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.check-tag.selected{border-color:var(--orange);background:var(--orange-light);color:var(--orange);font-weight:500}

.slider-group{display:flex;flex-direction:column;gap:6px}
.slider-wrap{display:flex;align-items:center;gap:10px}
.slider-wrap .lbl{font-size:11px;color:var(--text-sub);white-space:nowrap;min-width:48px}
.slider-wrap input[type=range]{flex:1;-webkit-appearance:none;height:5px;
  background:linear-gradient(to right,var(--cyan) var(--pct,50%),var(--border) var(--pct,50%));
  border-radius:3px;outline:none;
}
.slider-wrap input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:22px;height:22px;
  background:var(--card);border:2px solid var(--cyan);border-radius:50%;cursor:pointer;
  box-shadow:0 1px 4px rgba(8,145,178,0.2);
}
.slider-value{
  font-size:12px;font-weight:700;color:var(--cyan);
  min-width:30px;text-align:center;
  background:var(--cyan-light);border-radius:6px;padding:2px 6px;
}

/* ===== STEPS ===== */
.steps{display:flex;gap:6px;margin-bottom:18px;align-items:center}
.step{flex:1;height:3px;border-radius:2px;background:var(--border);transition:all .4s}
.step.done{background:var(--cyan)}
.step.current{background:var(--cyan);opacity:.5}
.step-label{font-size:11px;color:var(--text-sub);text-align:center;margin-bottom:12px}
.step-label strong{color:var(--cyan)}

/* ===== SCORE RING ===== */
.score-ring-wrap{display:flex;justify-content:center;margin:16px 0 12px;position:relative}
.score-ring-svg{width:140px;height:140px}
.score-ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.score-ring-num{font-size:44px;font-weight:800;line-height:1}
.score-ring-sub{font-size:11px;color:var(--text-sub);margin-top:2px}
.level-badge{display:inline-flex;align-items:center;gap:4px;
  padding:5px 14px;border-radius:20px;font-size:13px;font-weight:600;
  margin:0 auto;display:block;width:fit-content;margin-bottom:8px;
}

/* ===== DIMENSION BARS ===== */
.dim-bars{display:flex;flex-direction:column;gap:10px}
.dim-bar{display:flex;align-items:center;gap:10px}
.dim-bar-label{font-size:12px;font-weight:500;min-width:28px}
.dim-bar-track{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.dim-bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.16,1,.3,1)}
.dim-bar-val{font-size:12px;font-weight:700;min-width:26px;text-align:right}

/* ===== CAUSES ===== */
.cause-list{list-style:none}
.cause-item{padding:10px 12px;margin-bottom:6px;
  background:var(--bg);border-radius:var(--radius-sm);
  font-size:13px;display:flex;align-items:flex-start;gap:8px;
  border-left:3px solid var(--cyan);line-height:1.5;
}
.confidence{font-size:10px;padding:2px 7px;border-radius:8px;white-space:nowrap;
  font-weight:600;flex-shrink:0;margin-top:2px;line-height:1.4;
}
.conf-high{background:#FEE2E2;color:var(--red)}
.conf-mid{background:#FEF3C7;color:#D97706}
.conf-low{background:#E0F2FE;color:var(--cyan)}

/* ===== SUGGESTIONS ===== */
.suggestion-group{margin-bottom:14px}
.suggestion-group h4{font-size:12px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.suggestion-group ul{list-style:none;padding-left:2px}
.suggestion-group li{font-size:13px;padding:6px 0 6px 18px;position:relative;
  border-bottom:1px solid var(--border);line-height:1.5;
}
.suggestion-group li:last-child{border-bottom:none}
.suggestion-group li::before{
  content:'';position:absolute;left:0;top:14px;
  width:6px;height:6px;border-radius:50%;
}
.suggestion-urgent li::before{background:var(--red)}
.suggestion-short li::before{background:var(--orange)}
.suggestion-long li::before{background:var(--cyan)}

/* ===== HISTORY ===== */
.history-item{padding:13px 14px;background:var(--card);border-radius:var(--radius);
  margin-bottom:8px;box-shadow:var(--shadow);border:1px solid var(--border);cursor:pointer;
  display:flex;align-items:center;gap:12px;
  transition:transform .15s,box-shadow .15s;
  -webkit-tap-highlight-color:transparent;
}
.history-item:active{transform:scale(.98);box-shadow:var(--shadow-md)}
.history-dot{width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;flex-shrink:0;
}
.history-info{flex:1;min-width:0}
.history-date{font-size:13px;font-weight:600}
.history-detail{font-size:11px;color:var(--text-sub);margin-top:1px}
.history-arrow{color:var(--text-sub);font-size:16px;flex-shrink:0}

/* ===== EMPTY ===== */
.empty{text-align:center;padding:36px 20px;color:var(--text-sub)}
.empty .empty-icon{font-size:40px;margin-bottom:8px;opacity:.35}
.empty p{font-size:13px}
.empty .hint{font-size:11px;margin-top:4px;opacity:.7}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1E293B;color:#fff;padding:10px 22px;
  border-radius:24px;font-size:13px;z-index:200;
  opacity:0;transition:all .3s;pointer-events:none;
  box-shadow:0 4px 12px rgba(0,0,0,.2);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);
  z-index:150;display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--card);border-radius:16px 16px 0 0;
  padding:22px 18px calc(var(--safe-bottom) + 18px);
  width:100%;max-width:480px;max-height:70vh;overflow-y:auto;
}
.modal h3{font-size:16px;margin-bottom:14px}
.modal p{font-size:13px;color:var(--text-sub)}
.modal-actions{display:flex;gap:8px;margin-top:18px}
.modal-actions .btn{flex:1}

/* ===== INSTALL BANNER ===== */
.install-banner{display:none;position:fixed;bottom:calc(var(--tab-h) + var(--safe-bottom) + 12px);
  left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:460px;z-index:120;
  animation:slideUp .4s cubic-bezier(.16,1,.3,1);}
.install-banner.show{display:block}
.install-banner-inner{background:linear-gradient(135deg,#0891B2,#0E7490);
  border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:10px;
  box-shadow:0 4px 20px rgba(8,145,178,0.35);color:#fff;position:relative;}
.install-icon{font-size:28px;flex-shrink:0;width:40px;height:40px;
  background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.install-text{flex:1;min-width:0}
.install-title{font-size:13px;font-weight:700}
.install-desc{font-size:11px;opacity:.85;margin-top:1px}
.install-btn{background:rgba(255,255,255,0.25);border:1.5px solid rgba(255,255,255,0.5);
  color:#fff;padding:6px 16px;border-radius:8px;font-size:12px;font-weight:600;
  cursor:pointer;white-space:nowrap;backdrop-filter:blur(4px);transition:background .2s;}
.install-btn:active{background:rgba(255,255,255,0.4)}
.install-dismiss{background:none;border:none;color:rgba(255,255,255,0.7);font-size:16px;
  cursor:pointer;padding:4px;line-height:1;position:absolute;top:6px;right:8px;transition:color .2s;}
.install-dismiss:hover{color:#fff}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ===== DISCLAIMER ===== */
.disclaimer{font-size:10px;color:var(--text-sub);text-align:center;
  padding:8px 0 4px;line-height:1.5;opacity:.8;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s cubic-bezier(.16,1,.3,1)}
@keyframes scaleIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.scale-in{animation:scaleIn .5s cubic-bezier(.16,1,.3,1)}
@keyframes ringFill{from{stroke-dashoffset:var(--from)}to{stroke-dashoffset:var(--to)}}

/* ===== WEATHER CARD ===== */
.weather-card{background:linear-gradient(135deg,#E0F2FE 0%,#F0F9FF 100%);border-radius:var(--radius);
  padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;
  border:1.5px solid #BAE6FD;position:relative;overflow:hidden;
}
.weather-card .weather-icon{font-size:28px;flex-shrink:0;width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.7);border-radius:12px;
}
.weather-card .weather-info{flex:1;min-width:0}
.weather-card .weather-city{font-size:12px;font-weight:600;color:var(--cyan-dark)}
.weather-card .weather-data{font-size:11px;color:var(--text-sub);margin-top:2px}
.weather-card .weather-hint{font-size:10px;color:var(--cyan);margin-top:3px;
  font-weight:500;background:rgba(255,255,255,0.6);display:inline-block;
  padding:1px 8px;border-radius:6px;}
.weather-card .weather-change{cursor:pointer;color:var(--cyan);font-size:12px;
  font-weight:500;padding:4px 10px;border-radius:6px;border:1px solid var(--cyan);
  background:rgba(255,255,255,0.6);transition:all .2s;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.weather-card .weather-change:active{background:var(--cyan);color:#fff}
.weather-card .weather-loading{font-size:11px;color:var(--text-sub)}

/* ===== WEATHER IMPACT in RESULT ===== */
.weather-impact-card{background:var(--cyan-light);border-radius:var(--radius-sm);
  padding:12px 14px;margin-bottom:10px;border:1px solid #BAE6FD;
  font-size:12px;display:flex;align-items:flex-start;gap:8px;
}
.weather-impact-card .wi-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.weather-impact-card .wi-text{flex:1;min-width:0}
.weather-impact-card .wi-title{font-weight:600;color:var(--cyan-dark);margin-bottom:3px}
.weather-impact-card .wi-detail{color:var(--text-sub);font-size:11px;line-height:1.5}
.weather-impact-card .wi-items{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.weather-impact-tag{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:500}
.wi-tag-neg{background:#FEF2F2;color:var(--red)}
.wi-tag-pos{background:#F0FDF4;color:var(--green)}
.wi-tag-neu{background:var(--bg);color:var(--text-sub)}

/* ===== CITY PICKER MODAL ===== */
.city-picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);
  z-index:160;display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.city-picker-overlay.show{opacity:1;pointer-events:auto}
.city-picker{background:var(--card);border-radius:16px 16px 0 0;
  padding:18px 16px calc(var(--safe-bottom) + 16px);
  width:100%;max-width:480px;max-height:65vh;display:flex;flex-direction:column;
}
.city-picker-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.city-picker-title{font-size:16px;font-weight:700}
.city-picker-close{background:none;border:none;font-size:22px;cursor:pointer;
  color:var(--text-sub);padding:4px;line-height:1}
.city-picker-search{margin-bottom:10px}
.city-picker-search input{width:100%;padding:10px 14px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);font-size:14px;outline:none;
  font-family:var(--font);background:var(--bg);
}
.city-picker-search input:focus{border-color:var(--cyan)}
.city-picker-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.city-picker-item{padding:11px 14px;border-radius:8px;cursor:pointer;
  font-size:14px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);transition:background .15s;
  -webkit-tap-highlight-color:transparent;
}
.city-picker-item:active{background:var(--cyan-light)}
.city-picker-item .cp-coords{font-size:11px;color:var(--text-sub)}
.city-picker-item.current{background:var(--cyan-light);font-weight:600;color:var(--cyan-dark)}
.city-picker-item.current::after{content:'✓';color:var(--cyan);font-weight:700}
.city-picker-locate{padding:10px 14px;margin-bottom:8px;border-radius:var(--radius-sm);
  background:var(--cyan-light);color:var(--cyan-dark);font-size:13px;font-weight:600;
  cursor:pointer;text-align:center;border:1px dashed var(--cyan);
  display:flex;align-items:center;justify-content:center;gap:6px;
  -webkit-tap-highlight-color:transparent;
}
.city-picker-locate:active{background:#BAE6FD}

/* ===== ABOUT PAGE ===== */
.about-section{margin-bottom:14px}
.about-section-title{font-size:12px;font-weight:600;color:var(--text-sub);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:8px;padding-left:2px}
.version-card{text-align:center;padding:24px 18px}
.version-card .app-icon{width:56px;height:56px;border-radius:14px;
  background:linear-gradient(135deg,var(--cyan),var(--cyan-dark));
  display:flex;align-items:center;justify-content:center;margin:0 auto 12px;
  color:#fff;font-size:26px}
.version-card .app-name{font-size:20px;font-weight:700}
.version-card .version-num{font-size:13px;color:var(--text-sub);margin-top:4px}
.version-card .update-status{display:inline-flex;align-items:center;gap:4px;
  margin-top:8px;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:500}
.us-ok{background:#F0FDF4;color:var(--green)}
.us-check{background:#FEF9C3;color:#B45309}
.btn-sm{padding:8px 16px;font-size:12px}
.btn-row{display:flex;gap:8px;margin-top:10px}
.changelog-item{padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.changelog-item:last-child{border-bottom:none}
.changelog-item .cl-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}

<script>
/* ===========================
   DATA
   =========================== */
const KEY='health_assessments_v2';
const get=()=>{try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch{return[]}};
const save=l=>localStorage.setItem(KEY,JSON.stringify(l));
const add=a=>{const l=get();l.unshift(a);if(l.length>100)l.length=100;save(l);return l};

/* ===========================
   API CONFIG
   =========================== */
const API_BASE = (() => {
  // 同源部署 — 前后端在同一服务器，使用相对路径
  // 也可通过 localStorage.apiServer 覆盖为自定义地址
  const custom = localStorage.getItem('apiServer');
  if (custom) return custom;
  return '';  // 空字符串 = 同源请求
})();

/* ===========================
   AUTH ENGINE
   =========================== */
const AuthEngine = {
  _token: null,
  _user: null,

  isLoggedIn() {
    return !!this._token && !!this._user;
  },

  getToken() {
    return this._token;
  },

  getUser() {
    return this._user;
  },

  async login(username, password) {
    const res = await api.post('/api/auth/login', { username, password }, false);
    if (res.error) throw new Error(res.error);
    this._token = res.token;
    this._user = res.user;
    this._persist();
    return res;
  },

  async register(username, email, password) {
    const res = await api.post('/api/auth/register', { username, email, password }, false);
    if (res.error) throw new Error(res.error);
    this._token = res.token;
    this._user = res.user;
    this._persist();
    return res;
  },

  async refreshToken() {
    try {
      const res = await api.post('/api/auth/refresh', {}, true);
      if (res.token) {
        this._token = res.token;
        this._persist();
      }
      return this._token;
    } catch {
      this.logout();
      return null;
    }
  },

  logout() {
    this._token = null;
    this._user = null;
    localStorage.removeItem('auth_session');
    updateTabBar();
  },

  _persist() {
    if (this._token && this._user) {
      localStorage.setItem('auth_session', JSON.stringify({
        token: this._token,
        user: this._user,
        expiresAt: Date.now() + 7 * 24 * 3600 * 1000
      }));
    }
  },

  // Auto-restore session on app start
  autoLogin() {
    try {
      const raw = localStorage.getItem('auth_session');
      if (!raw) return false;
      const session = JSON.parse(raw);
      if (Date.now() > session.expiresAt) {
        localStorage.removeItem('auth_session');
        return false;
      }
      this._token = session.token;
      this._user = session.user;
      return true;
    } catch {
      return false;
    }
  }
};

/* ===========================
   API CLIENT
   =========================== */
const api = {
  async request(method, path, body, needAuth) {
    const headers = { 'Content-Type': 'application/json' };
    if (needAuth !== false) {
      const token = AuthEngine.getToken();
      if (token) headers['Authorization'] = 'Bearer ' + token;
    }

    try {
      const options = { method, headers };
      if (body) options.body = JSON.stringify(body);

      const res = await fetchWithTimeout(API_BASE + path, options, 8000);
      const data = await res.json();

      if (res.status === 401 && needAuth !== false) {
        // Token expired - try refresh
        const newToken = await AuthEngine.refreshToken();
        if (newToken) {
          headers['Authorization'] = 'Bearer ' + newToken;
          const retryRes = await fetchWithTimeout(API_BASE + path, { ...options, headers }, 8000);
          return await retryRes.json();
        }
        return { error: '登录已过期，请重新登录' };
      }

      return data;
    } catch (e) {
      if (e.name === 'AbortError') return { error: '网络请求超时，请检查网络' };
      return { error: '网络不可用，已切换为离线模式' };
    }
  },

  get(path, needAuth) { return this.request('GET', path, null, needAuth); },
  post(path, body, needAuth) { return this.request('POST', path, body, needAuth); },
  put(path, body, needAuth) { return this.request('PUT', path, body, needAuth); }
};

function fetchWithTimeout(url, options, timeout) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  return fetch(url, { ...options, signal: controller.signal }).finally(() => clearTimeout(timer));
}

/* ===========================
   SYNC ENGINE
   =========================== */
const SyncEngine = {
  _syncing: false,

  // Push local assessments to server
  async pushToServer() {
    if (!AuthEngine.isLoggedIn() || this._syncing) return;
    this._syncing = true;
    try {
      const local = get();
      if (!local.length) return;
      const res = await api.post('/api/assessments/sync', { records: local }, true);
      if (!res.error) console.log('Synced:', res.synced, 'records');
    } catch (e) {
      console.warn('Sync push failed:', e.message);
    } finally {
      this._syncing = false;
    }
  },

  // Pull assessments from server
  async pullFromServer() {
    if (!AuthEngine.isLoggedIn()) return [];
    try {
      const res = await api.get('/api/assessments?limit=200', true);
      if (res.error || !Array.isArray(res)) return [];
      return res;
    } catch {
      return [];
    }
  },

  // Full sync: push local + pull remote, merge
  async fullSync() {
    if (!AuthEngine.isLoggedIn()) return;
    await this.pushToServer();
    const remote = await this.pullFromServer();
    if (remote.length > 0) {
      const local = get();
      const localIds = new Set(local.map(r => r.id));
      for (const r of remote) {
        if (!localIds.has(r.local_id)) {
          local.push({
            id: r.local_id,
            ts: r.ts,
            date: r.date,
            scores: typeof r.scores === 'string' ? JSON.parse(r.scores) : r.scores,
            causes: typeof r.causes === 'string' ? JSON.parse(r.causes) : r.causes,
            sugg: typeof r.sugg === 'string' ? JSON.parse(r.sugg) : r.sugg,
            weather: r.weather ? (typeof r.weather === 'string' ? JSON.parse(r.weather) : r.weather) : null,
            modifiers: r.modifiers ? (typeof r.modifiers === 'string' ? JSON.parse(r.modifiers) : r.modifiers) : null,
            rawScores: r.raw_scores ? (typeof r.raw_scores === 'string' ? JSON.parse(r.raw_scores) : r.raw_scores) : null
          });
        }
      }
      local.sort((a, b) => b.id - a.id);
      if (local.length > 200) local.length = 200;
      save(local);
    }
    return remote.length;
  },

  // Push behavior logs to server
  async pushBehaviorLogs(logs) {
    if (!AuthEngine.isLoggedIn() || !logs.length) return;
    try {
      await api.post('/api/behavior/batch', { logs }, true);
    } catch {
      console.warn('Behavior log push failed');
    }
  },

  // Get user stats from server
  async getStats() {
    if (!AuthEngine.isLoggedIn()) return null;
    try {
      const res = await api.get('/api/stats', true);
      return res.error ? null : res;
    } catch {
      return null;
    }
  },

  // Get user profile from server
  async getProfile() {
    if (!AuthEngine.isLoggedIn()) return null;
    try {
      const res = await api.get('/api/user/profile', true);
      return res.error ? null : res;
    } catch {
      return null;
    }
  }
};
const save=l=>localStorage.setItem(KEY,JSON.stringify(l));
const add=a=>{const l=get();l.unshift(a);if(l.length>100)l.length=100;save(l);};

/* ===========================
   WEATHER ENGINE

  wIcon(c){if(c<=1)return'☀️';if(c===2)return'⛅';if(c===3)return'☁️';
    if(c>=45&&c<=48)return'🌫️';if(c>=51&&c<=55)return'🌦️';
    if(c>=61&&c<=65)return'🌧️';if(c>=71&&c<=77)return'❄️';
    if(c>=80&&c<=82)return'🌧️';if(c>=95)return'⛈️';return'🌡️';},
  wLabel(c){if(c<=1)return'晴';if(c===2)return'多云';if(c===3)return'阴';
    if(c>=45&&c<=48)return'雾';if(c>=51&&c<=55)return'小雨';
    if(c>=61&&c<=65)return'雨';if(c>=71&&c<=77)return'雪';
    if(c>=80&&c<=82)return'阵雨';if(c>=95)return'雷暴';return'未知';},

  async init(){
    const c=localStorage.getItem(this.CITY_KEY);
    if(c){try{this.currentCity=JSON.parse(c)}catch{}}
    const wx=localStorage.getItem(this.CACHE_KEY);
    if(wx){try{const d=JSON.parse(wx);if(Date.now()-d.ts<this.CACHE_TTL)this.currentWeather=d}catch{}}
    if(this.currentCity&&!this.currentWeather){
      this.fetchAndCache(this.currentCity.lat,this.currentCity.lon).catch(()=>{});
    }
    // Auto-detect via IP if no cached city and haven't declined before
    if(!this.currentCity&&!sessionStorage.getItem('_wx_declined')){
      this._autoDetectCity();
    }
  },

  async _autoDetectCity(){
    try{
      const r=await fetch('https://ipapi.co/json/',{signal:AbortSignal.timeout(5000)});
      if(!r.ok)return;
      const d=await r.json();
      if(d&&d.city&&d.latitude&&d.longitude){
        let match=this.CITIES.find(c=>c.name===d.city);
        if(!match)match=this.CITIES.find(c=>d.city.includes(c.name)||c.name.includes(d.city.substring(0,2)));
        if(match){
          this.currentCity=match;
          localStorage.setItem(this.CITY_KEY,JSON.stringify(match));
          localStorage.removeItem(this.CACHE_KEY);
          this.currentWeather=null;
          if(document.getElementById('page-home')&&document.getElementById('page-home').classList.contains('active'))renderHome();
          this.fetchAndCache(match.lat,match.lon).then(()=>{
            if(document.getElementById('page-home')&&document.getElementById('page-home').classList.contains('active'))renderHome();
          }).catch(()=>{});
        }
      }
    }catch{}
  },

  async fetchAndCache(lat,lon){
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),this.API_TIMEOUT);
    try{
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,surface_pressure,weather_code&timezone=auto`;
      const r=await fetch(url,{signal:ctrl.signal});
      if(!r.ok)throw new Error('Weather API fail');
      const d=await r.json(),cur=d.current;
      let aqi=null;
      try{
        const ar=await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=pm2_5,european_aqi`,{signal:AbortSignal.timeout(3000)});
        if(ar.ok){const ad=await ar.json();aqi=ad.current?.european_aqi||null}
      }catch{}
      const weather={
        temperature:cur.temperature_2m,humidity:cur.relative_humidity_2m,
        pressure:cur.surface_pressure,weatherCode:cur.weather_code,
        aqi:aqi,ts:Date.now(),fetchedAt:new Date().toISOString()
      };
      if(this.currentWeather?.pressure)weather.prevPressure=this.currentWeather.pressure;
      localStorage.setItem(this.CACHE_KEY,JSON.stringify(weather));
      this.currentWeather=weather;
      return weather;
    }finally{clearTimeout(t)}
  },

  async getWeather(){
    if(!this.currentCity)return null;
    if(this.currentWeather&&(Date.now()-this.currentWeather.ts<this.CACHE_TTL))return this.currentWeather;
    try{return await this.fetchAndCache(this.currentCity.lat,this.currentCity.lon)}
    catch{if(this.currentWeather)return this.currentWeather;return null}
  },

  calcModifiers(wx){
    const a={body:1.0,mind:1.0,life:1.0};if(!wx)return a;
    const t2=wx.temperature,h=wx.humidity,p=wx.pressure,pp=wx.prevPressure,code=wx.weatherCode,aqi=wx.aqi;
    if(t2>=35){a.body=Math.min(a.body,0.95);a.mind=Math.min(a.mind,0.96)}
    else if(t2<=0){a.body=Math.min(a.body,0.96);a.life=Math.min(a.life,0.97)}
    else if(t2>=18&&t2<=26){a.body=Math.max(a.body,1.02);a.mind=Math.max(a.mind,1.02);a.life=Math.max(a.life,1.02)}
    if(h>=85)a.body=Math.min(a.body,0.95);else if(h<=20)a.body=Math.min(a.body,0.97);
    if(pp!=null){const d2=p-pp;
      if(d2<=-10){a.body=Math.min(a.body,0.93);a.mind=Math.min(a.mind,0.95)}
      else if(d2>=10)a.mind=Math.max(a.mind,1.02)}
    if(code>=61&&code<=67||code===3)a.mind=Math.min(a.mind,0.96);
    if(code>=95){a.mind=Math.min(a.mind,0.95);a.body=Math.min(a.body,0.96)}
    if(code<=1){a.mind=Math.max(a.mind,1.03);a.life=Math.max(a.life,1.02)}
    if(aqi!=null){if(aqi>=100)a.body=Math.min(a.body,0.94);else if(aqi<=50)a.life=Math.max(a.life,1.02)}
    const cl=v=>Math.max(0.88,Math.min(1.06,Math.round(v*1e4)/1e4));
    a.body=cl(a.body);a.mind=cl(a.mind);a.life=cl(a.life);
    return a;
  },

  saveCity(city){
    this.currentCity=city;
    localStorage.setItem(this.CITY_KEY,JSON.stringify(city));
    localStorage.removeItem(this.CACHE_KEY);
    this.currentWeather=null;
    this.fetchAndCache(city.lat,city.lon).then(()=>{
      if(document.getElementById('page-home').classList.contains('active'))renderHome();
    }).catch(()=>{});
  },

  impactSummary(wx,alpha){
    const items=[];
    if(!wx)return items;
    if(alpha.body<1.0)items.push({dim:'身体',dir:'负向',pct:Math.round((1-alpha.body)*100),cls:'neg'});
    if(alpha.mind<1.0)items.push({dim:'心理',dir:'负向',pct:Math.round((1-alpha.mind)*100),cls:'neg'});
    if(alpha.life<1.0)items.push({dim:'生活',dir:'负向',pct:Math.round((1-alpha.life)*100),cls:'neg'});
    if(alpha.body>1.0)items.push({dim:'身体',dir:'正向',pct:Math.round((alpha.body-1)*100),cls:'pos'});
    if(alpha.mind>1.0)items.push({dim:'心理',dir:'正向',pct:Math.round((alpha.mind-1)*100),cls:'pos'});
    if(alpha.life>1.0)items.push({dim:'生活',dir:'正向',pct:Math.round((alpha.life-1)*100),cls:'pos'});
    return items;
  },

  renderCard(){
    const wx=this.currentWeather;
    const city=this.currentCity;
    if(!city)return`<div class="weather-card fade-up" onclick="openCityPicker()" style="cursor:pointer">
      <div class="weather-icon">🌤️</div>
      <div class="weather-info">
        <div class="weather-city">未设置城市</div>
        <div class="weather-data">点击设置城市以获取天气数据</div>
      </div>
      <span class="weather-change">设置</span>
    </div>`;
    if(!wx)return`<div class="weather-card fade-up" onclick="openCityPicker()" style="cursor:pointer">
      <div class="weather-icon">🌤️</div>
      <div class="weather-info">
        <div class="weather-city">${city.name}</div>
        <div class="weather-data weather-loading">正在获取天气数据...</div>
      </div>
      <span class="weather-change">切换</span>
    </div>`;
    const icon=this.wIcon(wx.weatherCode);
    const label=this.wLabel(wx.weatherCode);
    const alpha=this.calcModifiers(wx);
    let hint='今日天气适宜';
    const impacts=[];
    if(alpha.body<0.98||alpha.mind<0.98||alpha.life<0.98)hint='今日天气可能略微影响状态';
    if(alpha.body>=1.02&&alpha.mind>=1.02)hint='今日天气有利于身心状态';
    return`<div class="weather-card fade-up" onclick="openCityPicker()" style="cursor:pointer">
      <div class="weather-icon">${icon}</div>
      <div class="weather-info">
        <div class="weather-city">${city.name} · ${label}</div>
        <div class="weather-data">🌡 ${wx.temperature}°C &nbsp;💧 ${wx.humidity}% &nbsp;📊 ${wx.pressure}hPa${wx.aqi!=null?' &nbsp;AQI '+wx.aqi:''}</div>
        <span class="weather-hint">${hint}</span>
      </div>
      <span class="weather-change">切换</span>
    </div>`;
  }
};

    {id:'screen',label:'日均屏幕时间',type:'opt',

    {id:'rest',label:'休息质量',type:'opt',
     opts:[{v:100,l:'有充足休息'},{v:70,l:'偶尔休息'},{v:40,l:'很少休息'},{v:10,l:'完全没休息'}]}

/* ===========================
   ENGINE
   =========================== */
const W={
  body:{sleep:14,energy:12,pain:10,digest:8,exercise:6,diet:5,chronic:5},
  mind:{mood:9,stress:8,anxiety:7,focus:5,social:4,satisfy:2},
  life:{work:6,screen:4,hydrate:3,rest:2}
};
function calcDim(w,inp){let tw=0,ws=0;for(const[k,v]of Object.entries(w)){const val=inp[k];if(val!=null){ws+=(val/100)*v;tw+=v}}return tw>0?(ws/tw)*100:50}
function calc(inp,mod){
  // Process chronic
  let cScore=100;
  if(inp.chronic&&Array.isArray(inp.chronic)){
    if(!inp.chronic.includes('none')) cScore=Math.max(10,100-inp.chronic.length*12);
  }
  const i={...inp,chronic:cScore};
  let b=calcDim(W.body,i),m=calcDim(W.mind,i),l=calcDim(W.life,i);
  const alpha=mod||{body:1.0,mind:1.0,life:1.0};
  const rawB=Math.round(b),rawM=Math.round(m),rawL=Math.round(l);
  b=Math.round(b*alpha.body);m=Math.round(m*alpha.mind);l=Math.round(l*alpha.life);
  return{bodyScore:b,mindScore:m,lifeScore:l,totalScore:Math.round(b*0.50+m*0.35+l*0.15),
    rawScores:{body:rawB,mind:rawM,life:rawL,total:Math.round(rawB*0.50+rawM*0.35+rawL*0.15)},
    modifiers:alpha};
}
function level(s){
  if(s>=85)return{lv:'优秀',clr:'#22C55E',bg:'#F0FDF4'};
  if(s>=70)return{lv:'良好',clr:'#EAB308',bg:'#FEFCE8'};
  if(s>=50)return{lv:'一般',clr:'#F97316',bg:'#FFF7ED'};
  if(s>=30)return{lv:'较差',clr:'#EF4444',bg:'#FEF2F2'};
  return{lv:'预警',clr:'#DC2626',bg:'#FEE2E2'};
}
function causes(inp,sc){
  const r=[],a=(c,co)=>r.push({cause:c,conf:co});
  if(inp.sleep<=25&&inp.energy<=30) a('睡眠严重不足导致精力显著下降','high');
  else if(inp.sleep<=50) a('睡眠质量不佳影响日间精力','mid');
  if(inp.mood<=25&&inp.stress<=25) a('情绪低落与高压力形成恶性循环','high');
  if(inp.stress<=25&&inp.anxiety<=25) a('高压伴高度焦虑，需关注心理健康','high');
  if(inp.mood<=50) a('情绪状态偏低，可能影响整体生活','mid');
  if(inp.pain<=25) a('存在明显身体疼痛，建议就医检查','high');
  else if(inp.pain<=50) a('身体有轻微不适，注意休息','mid');
  if(inp.exercise<=30) a('运动不足，建议增加身体活动','mid');
  if(inp.screen<=25) a('屏幕时间过长，影响睡眠与眼睛','mid');
  if(inp.diet<=40) a('饮食不规律，影响消化与能量','mid');
  if(inp.work<=25) a('工作时间过长，生活失衡','mid');
  if(sc.totalScore<=49) a('多项指标偏低，建议系统性调整','high');
  if(sc.totalScore<=29) a('处于预警水平，建议尽快专业评估','high');
  return r;
}
function suggest(inp,sc,weather){
  const u=[],s=[],l=[];
  if(sc.totalScore<=49){u.push('建议尽快做一次综合体检');u.push('情绪持续低落超2周请考虑心理咨询');}
  if(inp.pain<=25) u.push('疼痛明显，建议预约对应科室就诊');
  if(inp.stress<=25&&inp.anxiety<=25) u.push('高压+焦虑，请立即做深呼吸放松练习');
  if(inp.sleep<=50){s.push('固定作息，睡前1小时远离屏幕，尝试478呼吸法');}
  if(inp.exercise<=50) s.push('从每天15分钟快走开始，逐步增至每周3-5次');
  if(inp.diet<=70) s.push('记录饮食日记，确保每天蔬菜水果摄入');
  if(inp.stress<=50) s.push('每天10-15分钟正念冥想降低即时压力');
  if(inp.screen<=50) s.push('每25分钟屏幕时间后休息5分钟远眺');
  if(inp.hydrate<=55) s.push('设置饮水提醒，目标每天1500-2000ml');
  if(inp.mood<=55) s.push('每天记录3件值得感恩的小事');
  l.push('建立规律作息，保证7-8小时睡眠');
  l.push('培养一项运动爱好并坚持下去');
  l.push('每季度自评一次，跟踪变化趋势');
  l.push('学习情绪管理技巧，提升心理韧性');
  // Weather-based suggestions
  if(weather){
    const t2=weather.temperature,h=weather.humidity,code=weather.weatherCode,aqi=weather.aqi;
    if(t2>=35){s.push('今日高温，注意补充水分，避免正午户外活动');s.push('高温天气下保持室内通风，穿着透气衣物');}
    else if(t2<=0){s.push('今日寒冷，户外注意保暖，特别是关节部位');s.push('低温天气可进行室内拉伸和瑜伽替代户外运动');}
    if(h>=85){s.push('今日湿度较高，关节不适者注意防潮保暖');s.push('高湿天气易疲劳，适当调整工作和运动强度');}
    else if(h<=20)s.push('空气干燥，注意多喝水和使用加湿器');
    if(code>=61&&code<=67||code===3)s.push('阴雨天气可能影响情绪，建议增加室内光照或听欢快音乐');
    if(code>=95)s.push('雷暴天气，避免户外活动，可做室内冥想放松');
    if(aqi!=null&&aqi>=100){s.push('今日空气污染较重，减少户外运动，外出佩戴口罩');}
    if(weather.prevPressure!=null&&(weather.pressure-weather.prevPressure)<=-10){
      s.push('气压骤降可能引发头痛，注意休息，可按摩太阳穴缓解');
    }
  }
  if(u.length===0&&s.length===0){s.push('状态良好，继续保持现有习惯');}
  return{u,s,l};
}

  document.querySelectorAll('#tabsLoggedIn .tab, #tabsLoggedOut .tab').forEach(t=>t.classList.remove('active'));

    login:'登录',register:'注册',profile:'个人中心'};
  document.getElementById('navTitle').textContent=titles[name]||'';

function startAssessment(){curStep=0;inp={};switchTab('assessment');renderStep(0);
  // Pre-fetch weather in background
  WeatherEngine.getWeather().catch(()=>{});
}

function renderStep(n){
  curStep=n;
  const sd=STEPS[n];
  const ind=document.getElementById('stepIndicator');
  const lbl=document.getElementById('stepLabel');

  ind.innerHTML=STEPS.map((_,i)=>{
    if(i<n)return'<div class="step done"></div>';
    if(i===n)return'<div class="step current"></div>';
    return'<div class="step"></div>';
  }).join('');
  lbl.innerHTML=`第 <strong>${n+1}</strong> / ${STEPS.length} 步：${sd.title}`;

  let h=`<div class="fade-up">`;
  h+=`<h2 style="font-size:18px;font-weight:700;margin-bottom:2px">${sd.icon} ${sd.title}</h2>`;
  h+=`<p style="font-size:12px;color:var(--text-sub);margin-bottom:16px">${sd.subtitle}</p>`;

  sd.fields.forEach(f=>{
    h+=`<div class="form-group">`;
    h+=`<label class="form-label">${f.label} <span class="required">*</span></label>`;

    if(f.type==='opt'){
      h+=`<div class="option-group">`;
      f.opts.forEach(o=>{
        const sel=inp[f.id]===o.v?' selected':'';
        h+=`<div class="option${sel}" onclick="selOpt(this,'${f.id}',${o.v})"><span class="radio"></span>${o.l}</div>`;
      });
      h+=`</div>`;
    }

    if(f.type==='slider'){
      const v=inp[f.id]!=null?inp[f.id]:50;
      h+=`<div class="slider-group">`;
      h+=`<div class="slider-wrap">`;
      h+=`<span class="lbl">${f.lo}</span>`;
      h+=`<input type="range" min="0" max="100" step="10" value="${v}" oninput="updSlider(this,'${f.id}',${f.lo},${f.hi})" style="--pct:${v}%">`;
      h+=`<span class="lbl" style="text-align:right">${f.hi}</span>`;
      h+=`<span class="slider-value" id="sv_${f.id}">${v}</span>`;
      h+=`</div></div>`;
      if(inp[f.id]==null)inp[f.id]=50;
    }

    if(f.type==='check'){
      h+=`<div class="check-group">`;
      const selArr=inp[f.id]||[];
      f.opts.forEach(o=>{
        const is=selArr.includes(o.v)?' selected':'';
        h+=`<div class="check-tag${is}" onclick="togChk(this,'${f.id}','${o.v}')">${o.l}</div>`;
      });
      h+=`</div>`;
    }

    h+=`</div>`;
  });

  h+=`<div style="display:flex;gap:8px;margin-top:22px">`;
  if(n>0) h+=`<button class="btn btn-secondary" style="flex:1" onclick="renderStep(${n-1})">← 上一步</button>`;
  if(n<STEPS.length-1) h+=`<button class="btn btn-primary" style="flex:${n>0?1:1}" onclick="nextStep()">下一步 →</button>`;
  else h+=`<button class="btn btn-primary" style="flex:${n>0?1:1}" onclick="submit()">📊 生成报告</button>`;
  h+=`</div></div>`;

  document.getElementById('assessmentContent').innerHTML=h;
  window.scrollTo(0,0);
}

function selOpt(el,fid,v){el.parentElement.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');inp[fid]=v;}
function updSlider(el,fid,lo,hi){inp[fid]=+el.value;el.style.setProperty('--pct',el.value+'%');
  const ve=document.getElementById('sv_'+fid);if(ve)ve.textContent=el.value;}
function togChk(el,fid,v){
  if(!inp[fid])inp[fid]=[];
  if(v==='none'){
    if(el.classList.contains('selected')){el.classList.remove('selected');inp[fid]=[];}
    else{el.parentElement.querySelectorAll('.check-tag').forEach(t=>t.classList.remove('selected'));
      el.classList.add('selected');inp[fid]=['none'];}return;
  }
  inp[fid]=inp[fid].filter(x=>x!=='none');
  const idx=inp[fid].indexOf(v);
  if(idx>=0){inp[fid].splice(idx,1);el.classList.remove('selected');}
  else{inp[fid].push(v);el.classList.add('selected');}
}
function nextStep(){
  const sd=STEPS[curStep];
  const miss=sd.fields.filter(f=>{if(f.type==='check')return!inp[f.id]||!inp[f.id].length;return inp[f.id]==null;});
  if(miss.length){showToast(`请完成当前步骤所有项目（剩余 ${miss.length} 项）`);return;}
  renderStep(curStep+1);
}
async function submit(){
  const miss=STEPS.flatMap(s=>s.fields).filter(f=>{if(f.type==='check')return!inp[f.id]||!inp[f.id].length;return inp[f.id]==null;});
  if(miss.length){showToast(`请完成所有评估项（剩余 ${miss.length} 项）`);return;}
  // Fetch weather if possible
  let weather=null,modifiers=null;
  try{weather=await WeatherEngine.getWeather();modifiers=WeatherEngine.calcModifiers(weather)}catch{}
  const sc=calc(inp,modifiers),cs=causes(inp,sc),sg=suggest(inp,sc,weather);
  add({id:Date.now(),ts:new Date().toISOString(),inp:{...inp},scores:sc,causes:cs,sugg:sg,weather:weather,modifiers:modifiers});
  // Async sync to server (non-blocking)
  if(AuthEngine.isLoggedIn()) SyncEngine.pushToServer().catch(()=>{});
  // Log behavior
  logAction('assess_complete',{totalScore:sc.totalScore});
  showResult({scores:sc,causes:cs,sugg:sg,ts:new Date().toISOString(),weather:weather,modifiers:modifiers});
}

  h+=`<div class="score-ring-wrap">`;

    stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C}"

  h+=`</div></div>`;
  h+=`<span class="level-badge" style="background:${lv.bg};color:${lv.clr}">${lv.lv}</span>`;
  h+=`</div>`;

  // Weather Impact Card
  if(wx&&mod&&s.rawScores){
    const impacts=WeatherEngine.impactSummary(wx,mod);
    const icon=WeatherEngine.wIcon(wx.weatherCode);
    const label=WeatherEngine.wLabel(wx.weatherCode);
    if(impacts.length>0||s.rawScores.total!==s.totalScore){
      h+=`<div class="weather-impact-card fade-up" style="animation-delay:.05s">`;
      h+=`<div class="wi-icon">${icon}</div>`;
      h+=`<div class="wi-text">`;
      h+=`<div class="wi-title">今日天气影响分析 · ${label} ${wx.temperature}°C</div>`;

        const diff=s.totalScore-s.rawScores.total;
        const arrow=diff>0?'↑':'↓';
        const dir=diff>0?'正向提升':'负向调节';
        h+=`气候因子对综合得分${dir} <b>${Math.abs(diff)}</b> 分（原始 ${s.rawScores.total} ${arrow} 调整后 ${s.totalScore}）`;
      }
      h+=`</div>`;
      if(impacts.length>0){
        h+=`<div class="wi-items">`;
        impacts.forEach(im=>{
          const tagCls=im.cls==='pos'?'wi-tag-pos':'wi-tag-neg';
          h+=`<span class="weather-impact-tag ${tagCls}">${im.dim} ${im.dir} ~${im.pct}%</span>`;
        });
        h+=`</div>`;
      }
      h+=`</div></div>`;
    }
  }

  // Dimension Radar Chart
  h+=`<div class="card fade-up" style="animation-delay:.1s">
    <div class="card-header"><span class="icon">📊</span>分维度得分</div>
    <div class="radar-wrap">${drawRadar(s)}</div>
  </div>`;

  // Causes
  h+=`<div class="card fade-up" style="animation-delay:.15s">`;
  h+=`<div class="card-header"><span class="icon">🔍</span>可能原因</div>`;
  if(c.length){
    h+=`<ul class="cause-list">`;

/* ===========================
   TREND CHART (Canvas)
   =========================== */
function drawTrend(list){
  const canvas=document.getElementById('trendCanvas');
  if(!canvas||list.length<2)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=canvas.width,H=canvas.height;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,W,H);

  // Margins
  const ml=48,mr=28,mt=32,mb=36;
  const pw=W-ml-mr,ph=H-mt-mb;

  // Reverse list for chronological order (oldest first)
  const data=list.slice().reverse();
  const scores=data.map(d=>d.scores.totalScore);
  const minS=Math.max(0,Math.floor(Math.min(...scores)/10)*10-10);
  const maxS=Math.min(100,Math.ceil(Math.max(...scores)/10)*10+10);

  // Draw grid
  ctx.strokeStyle='#E2E8F0';ctx.lineWidth=1;
  const gridLines=5;
  for(let i=0;i<=gridLines;i++){
    const y=mt+(ph/gridLines)*i;
    ctx.beginPath();ctx.moveTo(ml,y);ctx.lineTo(W-mr,y);ctx.stroke();
    ctx.fillStyle='#94A3B8';ctx.font='10px -apple-system,sans-serif';
    ctx.textAlign='right';
    const val=Math.round(maxS-(maxS-minS)/gridLines*i);
    ctx.fillText(val,ml-8,y+4);
  }
  // X axis labels
  ctx.textAlign='center';
  data.forEach((d,i)=>{
    const x=ml+(pw/(data.length-1||1))*i;
    ctx.fillStyle='#94A3B8';ctx.font='9px -apple-system,sans-serif';
    const dt=new Date(d.ts);
    ctx.fillText(`${dt.getMonth()+1}/${dt.getDate()}`,x,H-mb+16);
  });

  // Draw filled area
  const getX=i=>ml+(pw/(data.length-1||1))*i;
  const getY=v=>mt+ph-(ph*(v-minS)/(maxS-minS));

  // Gradient fill
  const grad=ctx.createLinearGradient(0,mt,0,H-mb);
  grad.addColorStop(0,'rgba(8,145,178,0.18)');
  grad.addColorStop(1,'rgba(8,145,178,0.02)');
  ctx.beginPath();
  data.forEach((d,i)=>{
    const x=getX(i),y=getY(d.scores.totalScore);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.lineTo(getX(data.length-1),H-mb);
  ctx.lineTo(getX(0),H-mb);
  ctx.closePath();ctx.fillStyle=grad;ctx.fill();

  // Draw line
  ctx.beginPath();
  data.forEach((d,i)=>{
    const x=getX(i),y=getY(d.scores.totalScore);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.strokeStyle='#0891B2';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();

  // Draw dots
  data.forEach((d,i)=>{
    const x=getX(i),y=getY(d.scores.totalScore);
    const lv=level(d.scores.totalScore);
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle=lv.clr;ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    // Score label
    ctx.fillStyle=lv.clr;ctx.font='bold 10px -apple-system,sans-serif';
    ctx.textAlign='center';
    ctx.fillText(d.scores.totalScore,x,y-12);
  });
}

/* ===========================
   RADAR CHART (SVG)
   =========================== */
function drawRadar(scores){
  const dims=[
    {label:'身体',score:scores.bodyScore,color:'var(--cyan)'},
    {label:'心理',score:scores.mindScore,color:'var(--orange)'},
    {label:'生活',score:scores.lifeScore,color:'#8B5CF6'}
  ];
  const cx=120,cy=120,r=90,n=dims.length;
  const levels=5;

  let svg=`<svg class="radar-svg" viewBox="0 0 240 240">`;

  // Grid polygons
  for(let lv=1;lv<=levels;lv++){
    const pts=[];
    for(let i=0;i<n;i++){
      const angle=-Math.PI/2+(2*Math.PI*i)/n;
      const rad=(r/levels)*lv;
      pts.push(`${cx+rad*Math.cos(angle)},${cy+rad*Math.sin(angle)}`);
    }
    svg+=`<polygon points="${pts.join(' ')}" fill="none" stroke="${lv===levels?'#CBD5E1':'#E2E8F0'}" stroke-width="${lv===levels?1.5:0.8}"/>`;
  }

  // Axis lines
  for(let i=0;i<n;i++){
    const angle=-Math.PI/2+(2*Math.PI*i)/n;
    svg+=`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(angle)}" y2="${cy+r*Math.sin(angle)}" stroke="#E2E8F0" stroke-width="0.8"/>`;
  }

  // Data polygon
  const pts=[];
  for(let i=0;i<n;i++){
    const angle=-Math.PI/2+(2*Math.PI*i)/n;
    const rad=(dims[i].score/100)*r;
    pts.push(`${cx+rad*Math.cos(angle)},${cy+rad*Math.sin(angle)}`);
  }
  svg+=`<polygon points="${pts.join(' ')}" fill="rgba(8,145,178,0.15)" stroke="#0891B2" stroke-width="2" stroke-linejoin="round"/>`;

  // Data points
  dims.forEach((d,i)=>{
    const angle=-Math.PI/2+(2*Math.PI*i)/n;
    const rad=(d.score/100)*r;
    const px=cx+rad*Math.cos(angle),py=cy+rad*Math.sin(angle);
    svg+=`<circle cx="${px}" cy="${py}" r="5" fill="${d.color}" stroke="#fff" stroke-width="2"/>`;
  });

  // Labels
  dims.forEach((d,i)=>{
    const angle=-Math.PI/2+(2*Math.PI*i)/n;
    const lr=r+20;
    const lx=cx+lr*Math.cos(angle),ly=cy+lr*Math.sin(angle);
    const anchor=i===0?'middle':(i===1?'start':'end');
    svg+=`<text x="${lx}" y="${ly}" text-anchor="${anchor}" dominant-baseline="middle"
      fill="${d.color}" font-size="12" font-weight="600">${d.label} ${d.score}分</text>`;
  });

  svg+=`</svg>`;
  return svg;
}

function exportJSON(){
  const list=get();
  if(!list.length){showToast('暂无数据可导出');return;}
  const blob=new Blob([JSON.stringify(list,null,2)],{type:'application/json'});
  downloadBlob(blob,'健康评估数据_'+new Date().toISOString().slice(0,10)+'.json');
  showToast('✅ JSON 导出成功');
}

function exportCSV(){
  const list=get();
  if(!list.length){showToast('暂无数据可导出');return;}
  const header='日期,综合得分,身体得分,心理得分,生活得分,等级\n';
  const rows=list.map(r=>{
    const lv=level(r.scores.totalScore);
    return `${fmt(r.ts)},${r.scores.totalScore},${r.scores.bodyScore},${r.scores.mindScore},${r.scores.lifeScore},${lv.lv}`;
  }).join('\n');
  const blob=new Blob(['\uFEFF'+header+rows],{type:'text/csv;charset=utf-8'});
  downloadBlob(blob,'健康评估数据_'+new Date().toISOString().slice(0,10)+'.csv');
  showToast('✅ CSV 导出成功');
}

function downloadBlob(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function openCityPicker(){
  const overlay=document.getElementById('cityPickerOverlay');
  overlay.classList.add('show');

  setTimeout(()=>document.getElementById('citySearchInput').focus(),200);

function closeCityPicker(){
  document.getElementById('cityPickerOverlay').classList.remove('show');
}
function renderCityList(filter=''){
  const list=document.getElementById('cityPickerList');
  const current=WeatherEngine.currentCity;
  let cities=WeatherEngine.CITIES;
  if(filter){
    const q=filter.toLowerCase();
    cities=cities.filter(c=>c.name.includes(filter)||c.name.toLowerCase().includes(q));
  }
  let html='';
  cities.forEach(c=>{
    const isCurrent=current&&current.name===c.name?' current':'';
    html+=`<div class="city-picker-item${isCurrent}" onclick="selectCity('${c.name}',${c.lat},${c.lon})">
      <span>${c.name}</span><span class="cp-coords">${c.lat.toFixed(1)}°, ${c.lon.toFixed(1)}°</span></div>`;
  });
  if(cities.length===0)html='<div style="text-align:center;padding:20px;color:var(--text-sub);font-size:13px">未找到匹配城市</div>';
  list.innerHTML=html;
}
function filterCities(){
  const q=document.getElementById('citySearchInput').value;
  renderCityList(q);
}
function selectCity(name,lat,lon){
  WeatherEngine.saveCity({name,lat,lon});
  closeCityPicker();
  showToast('已切换到 '+name);
}
function locateCity(){
  const btn=document.getElementById('cityLocateBtn');
  btn.innerHTML='<span>⏳</span> 正在定位...';
  btn.style.pointerEvents='none';
  if(!navigator.geolocation){
    showToast('浏览器不支持定位，请手动选择城市');
    btn.innerHTML='<span>📍</span> 使用当前位置';
    btn.style.pointerEvents='auto';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const{latitude:lat,longitude:lon}=pos.coords;
      // Find nearest city
      let nearest=null,minDist=Infinity;
      WeatherEngine.CITIES.forEach(c=>{
        const d=Math.hypot(c.lat-lat,c.lon-lon);
        if(d<minDist){minDist=d;nearest=c;}
      });
      if(nearest&&minDist<5){
        WeatherEngine.saveCity(nearest);
        closeCityPicker();
        showToast('已定位到 '+nearest.name);
      }else{
        showToast('定位成功，请在列表中选择最近城市');
      }
      btn.innerHTML='<span>📍</span> 使用当前位置';
      btn.style.pointerEvents='auto';
    },
    err=>{
      showToast('定位失败：'+err.message+'，请手动选择');
      btn.innerHTML='<span>📍</span> 使用当前位置';
      btn.style.pointerEvents='auto';
    },
    {enableHighAccuracy:false,timeout:8000,maximumAge:300000}
  );
}

const _behaviorBuffer=[];

function logAction(action,detail){
  if(!AuthEngine.isLoggedIn())return; // only log when logged in
  _behaviorBuffer.push({action,detail:detail||null,sessionId:_sessionId,ts:Date.now()});
  // Batch upload every 20 logs or on page unload
  if(_behaviorBuffer.length>=20){
    SyncEngine.pushBehaviorLogs(_behaviorBuffer.splice(0)).catch(()=>{});
  }
}

let _sessionId='sess_'+Date.now();

// Flush logs on page unload
window.addEventListener('beforeunload',()=>{
  if(_behaviorBuffer.length>0){
    // Use sendBeacon for reliable last-minute upload
    if(AuthEngine.isLoggedIn()){
      const payload=JSON.stringify({logs:_behaviorBuffer});
      navigator.sendBeacon(API_BASE+'/api/behavior/batch',new Blob([payload],{type:'application/json'}));
    }
  }
});

// Log page views
const _origSwitchTab=switchTab;
switchTab=function(name){
  if(name!=='login'&&name!=='register')logAction('page_view',{page:name});

};

}

// 监听安装完成
window.addEventListener('appinstalled',()=>{
  console.log('[PWA] 应用已安装');
  showToast('✅ 已成功安装到手机！');
  document.getElementById('installBanner').classList.remove('show');
  deferredPrompt=null;
});

/* ===========================
   SERVICE WORKER
   =========================== */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./service-worker.js',{scope:'./'})
      .then(reg=>{
        console.log('[SW] 注册成功:',reg.scope);
        // 检测更新
        reg.addEventListener('updatefound',()=>{
          const nw=reg.installing;
          nw.addEventListener('statechange',()=>{
            if(nw.state==='installed'&&navigator.serviceWorker.controller){
              showToast('� updates 新版本可用，刷新页面更新');
            }
          });
        });
      })
      .catch(err=>console.log('[SW] 注册失败:',err));
  });
}

/* ===========================
   INIT
   =========================== */
(function initApp(){
  // Safe area padding
  const style=getComputedStyle(document.documentElement);
  let st=style.getPropertyValue('--safe-top')||'0px';
  let sb=style.getPropertyValue('--safe-bottom')||'16px';
  if(!sessionStorage.getItem('_sa_set')){
    const isStandalone=window.matchMedia('(display-mode: standalone)').matches||navigator.standalone;
    const isAndroid=/Android/i.test(navigator.userAgent);
    if(isStandalone&&isAndroid){st='24px';sb='24px';}
    sessionStorage.setItem('_sa_set','1');
  }
  document.documentElement.style.setProperty('--safe-top',st);
  document.documentElement.style.setProperty('--safe-bottom',sb);

  // Auto-restore auth session
  const restored=AuthEngine.autoLogin();
  updateTabBar();
  if(restored){
    logAction('app_open');
    SyncEngine.fullSync().catch(()=>{});
  }

  WeatherEngine.init().then(()=>renderHome()).catch(()=>renderHome());
})();
</script>
