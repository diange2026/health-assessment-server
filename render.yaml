services:
  - type: web
    name: health-assessment-api
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
